*{

}

body{
    background:#f5f7fa;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

.container{
    background:#fff;

}

.logo{
    width:180px;
    max-width:80%;
    display:block;
    margin:0 auto 30px;
}

.success-icon{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#16a34a;
    color:#fff;
    font-size:48px;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto 25px;
}

h1{
    color:#16a34a;
    font-size:32px;

}

.subtitle{
    font-size:18px;
    color:#444;
    margin-bottom:20px;
    line-height:1.5;
}

.order-number{
    background:#f8fafc;
    border:1px solid #e2e8f0;
    padding:15px;
    border-radius:10px;
    margin-bottom:25px;
    font-size:18px;
}

.order-number strong{
    color:#16a34a;
}

.info-box{
    background:#f8fafc;
    border:1px solid #e2e8f0;
    border-radius:12px;
    padding:25px;
    text-align:left;
}

.info-box p{
    margin-bottom:15px;
    line-height:1.7;
    color:#333;
}

.info-box p:last-child{
    margin-bottom:0;
}

.highlight{
    color:#16a34a;
    font-weight:bold;
}

.footer{
    margin-top:30px;
    color:#666;
    font-size:14px;
}

@media(max-width:768px){

    h1{

    .subtitle{
        font-size:16px;

<script>
function gerarNumeroPedido() {
    const ano = new Date().getFullYear();
    const aleatorio = Math.floor(100000 + Math.random() * 900000);

    document.getElementById('pedidoNumero').textContent =
        'PED-' + ano + '-' + aleatorio;
}

gerarNumeroPedido();
